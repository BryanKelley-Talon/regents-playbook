<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#C41E3A">
<title>Regents Playbook · US 11R</title>
<style>
  :root {
    --regents-red: #C41E3A;
    --regents-red-dark: #8B1329;
    --tier1-red: #C41E3A;
    --tier2-orange: #C07A1C;
    --thread-green: #1B4332;
    --cream: #F5F2E8;
    --charcoal: #1A1A1A;
    --muted: #6B6B6B;
    --gold: #B8860B;
    --card-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--charcoal);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    overflow: hidden;
    overscroll-behavior: none;
    user-select: none;
    -webkit-user-select: none;
  }

  /* APP SHELL */
  .app {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    background: var(--charcoal);
  }

  /* HEADER TABS */
  .tabs {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    background: var(--charcoal);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding: env(safe-area-inset-top) 0 0 0;
    flex-shrink: 0;
  }
  .tab {
    background: none;
    border: none;
    color: rgba(255,255,255,0.4);
    padding: 12px 8px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: color 0.2s, border-color 0.2s;
    font-family: inherit;
    text-transform: uppercase;
  }
  .tab.active {
    color: #fff;
    border-bottom-color: var(--regents-red);
  }
  .tab-label {
    display: block;
    font-size: 9px;
    font-weight: 500;
    margin-top: 2px;
    opacity: 0.6;
    letter-spacing: 0.5px;
  }

  /* DECK CONTAINER */
  .deck-container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .deck {
    position: absolute;
    inset: 0;
    display: none;
  }
  .deck.active { display: block; }

  .cards {
    position: absolute;
    inset: 0;
    display: flex;
    transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.3, 1);
    will-change: transform;
  }

  .card {
    flex: 0 0 100%;
    width: 100%;
    height: 100%;
    padding: 16px 14px 64px 14px;
    display: flex;
    flex-direction: column;
  }

  /* CARD STYLES */
  .card-inner {
    flex: 1;
    background: var(--cream);
    border-radius: 18px;
    box-shadow: var(--card-shadow);
    padding: 18px 20px 16px 20px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    min-height: 22px;
    margin-bottom: 4px;
  }

  .tier-flag {
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 1.2px;
    padding: 3px 8px;
    border-radius: 3px;
    text-transform: uppercase;
  }
  .tier-flag.tier-1 {
    background: var(--tier1-red);
    color: #fff;
  }
  .tier-flag.tier-2 {
    background: var(--tier2-orange);
    color: #fff;
  }

  .card-number {
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 1px;
    margin-left: auto;
  }

  .card-icon {
    font-size: 44px;
    text-align: center;
    margin: 4px 0 10px 0;
    line-height: 1;
  }

  .card-title {
    font-size: 22px;
    font-weight: 800;
    color: var(--charcoal);
    line-height: 1.15;
    margin-bottom: 12px;
    letter-spacing: -0.3px;
    text-align: center;
  }

  .card-op {
    font-size: 16px;
    font-weight: 500;
    line-height: 1.42;
    color: var(--charcoal);
    flex: 1;
    display: flex;
    align-items: center;
    text-align: center;
  }

  .card-meta {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 2px solid rgba(0,0,0,0.08);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .exam-term {
    font-size: 10px;
    font-weight: 700;
    color: var(--regents-red);
    letter-spacing: 1.3px;
    text-transform: uppercase;
  }

  .thread-tag {
    font-size: 10px;
    font-weight: 600;
    color: var(--thread-green);
    background: rgba(27, 67, 50, 0.1);
    padding: 3px 7px;
    border-radius: 4px;
    letter-spacing: 0.3px;
  }

  .pointer-footer {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed rgba(0,0,0,0.12);
  }
  .pointer-line {
    font-size: 11px;
    font-style: italic;
    color: var(--muted);
    line-height: 1.35;
    margin-bottom: 3px;
  }
  .pointer-line:last-child { margin-bottom: 0; }

  /* INTRO CARDS (test-day cards) */
  .card.intro .card-inner {
    background: var(--regents-red);
    color: #fff;
  }
  .card.intro .card-title,
  .card.intro .card-op {
    color: #fff;
  }
  .card.intro .card-number {
    color: rgba(255,255,255,0.7);
  }
  .card.intro .exam-term {
    color: #fff;
  }
  .card.intro .card-meta {
    border-top-color: rgba(255,255,255,0.25);
  }

  /* FUNNEL CARD */
  .card.funnel .card-inner {
    background: var(--thread-green);
    color: #fff;
  }
  .card.funnel .card-title,
  .card.funnel .card-op {
    color: #fff;
  }
  .card.funnel .card-number {
    color: rgba(255,255,255,0.7);
  }
  .card.funnel .exam-term {
    color: #fff;
  }
  .card.funnel .card-meta {
    border-top-color: rgba(255,255,255,0.25);
  }

  /* PROGRESS DOTS */
  .dots {
    position: absolute;
    bottom: 18px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 5px;
    padding: 0 20px;
    flex-wrap: wrap;
    max-height: 40px;
  }
  .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    transition: background 0.2s, width 0.2s;
  }
  .dot.active {
    background: #fff;
    width: 18px;
    border-radius: 3px;
  }

  /* HINT TEXT */
  .swipe-hint {
    position: absolute;
    bottom: 42px;
    left: 0;
    right: 0;
    text-align: center;
    color: rgba(255,255,255,0.4);
    font-size: 10px;
    letter-spacing: 1px;
    pointer-events: none;
    transition: opacity 0.3s;
    font-weight: 500;
  }
  .swipe-hint.hidden { opacity: 0; }

  /* LANDSCAPE / DESKTOP */
  @media (min-width: 480px) {
    .app {
      max-width: 420px;
      margin: 0 auto;
      border-left: 1px solid rgba(255,255,255,0.05);
      border-right: 1px solid rgba(255,255,255,0.05);
    }
  }

  @media (min-height: 740px) {
    .card-icon { font-size: 52px; margin: 8px 0 14px 0; }
    .card-title { font-size: 25px; margin-bottom: 16px; }
    .card-op { font-size: 17px; }
  }
</style>
</head>

const DECKS = {};
for (const [id, deck] of Object.entries(PLAYBOOK.decks)) {
  DECKS[id] = deck.slides;
}

// ============================================================================
// RENDER
// ============================================================================

function escapeHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderCard(c, i, total) {
  const tierBadge = c.tier === 1
    ? '<span class="tier-flag tier-1">Tier 1 · Every Exam</span>'
    : c.tier === 2
    ? '<span class="tier-flag tier-2">Tier 2 · Most Exams</span>'
    : '';

  const threadTag = c.thread ? `<span class="thread-tag">${escapeHtml(c.thread)}</span>` : '';

  const pointers = [];
  if (c.pointer) pointers.push(`<div class="pointer-line">${escapeHtml(c.pointer)}</div>`);
  if (c.pointer2) pointers.push(`<div class="pointer-line">${escapeHtml(c.pointer2)}</div>`);
  const pointerBlock = pointers.length
    ? `<div class="pointer-footer">${pointers.join('')}</div>`
    : '';

  return `
    <div class="card ${c.type}">
      <div class="card-inner">
        <div class="card-header">
          ${tierBadge}
          <span class="card-number">${String(i + 1).padStart(2, '0')} / ${String(total).padStart(2, '0')}</span>
        </div>
        <div class="card-icon">${c.icon}</div>
        <div class="card-title">${escapeHtml(c.title)}</div>
        <div class="card-op">${escapeHtml(c.op)}</div>
        <div class="card-meta">
          <span class="exam-term">${escapeHtml(c.term)}</span>
          ${threadTag}
        </div>
        ${pointerBlock}
      </div>
    </div>
  `;
}

function renderDeck(deckId) {
  const cards = DECKS[deckId];
  const cardsEl = document.getElementById(`cards-${deckId}`);
  const dotsEl = document.getElementById(`dots-${deckId}`);

  cardsEl.innerHTML = cards.map((c, i) => renderCard(c, i, cards.length)).join('');
  dotsEl.innerHTML = cards.map((_, i) => `<span class="dot ${i === 0 ? 'active' : ''}"></span>`).join('');
}

renderDeck("1");
renderDeck("2");
renderDeck("3");

// ============================================================================
// NAVIGATION
// ============================================================================

const state = {
  currentDeck: "1",
  positions: { "1": 0, "2": 0, "3": 0 }
};

function updateCarousel(deckId) {
  const cardsEl = document.getElementById(`cards-${deckId}`);
  const dotsEl = document.getElementById(`dots-${deckId}`);
  const pos = state.positions[deckId];
  cardsEl.style.transform = `translateX(-${pos * 100}%)`;
  Array.from(dotsEl.children).forEach((dot, i) => {
    dot.classList.toggle('active', i === pos);
  });
  if (pos > 0) {
    document.getElementById('swipeHint').classList.add('hidden');
  }
}

function switchDeck(deckId) {
  state.currentDeck = deckId;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.deck === deckId));
  document.querySelectorAll('.deck').forEach(d => d.classList.toggle('active', d.dataset.deckId === deckId));
  if (state.positions[deckId] === 0) {
    document.getElementById('swipeHint').classList.remove('hidden');
  }
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => switchDeck(tab.dataset.deck));
});

let touchStartX = null, touchStartY = null;
const SWIPE_THRESHOLD = 50;
const MAX_VERTICAL_SLOP = 80;

document.getElementById('deckContainer').addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.getElementById('deckContainer').addEventListener('touchend', (e) => {
  if (touchStartX === null) return;
  const endX = e.changedTouches[0].clientX;
  const endY = e.changedTouches[0].clientY;
  const dx = endX - touchStartX;
  const dy = endY - touchStartY;
  if (Math.abs(dx) > SWIPE_THRESHOLD && Math.abs(dy) < MAX_VERTICAL_SLOP) {
    const deck = state.currentDeck;
    const maxPos = DECKS[deck].length - 1;
    if (dx < 0 && state.positions[deck] < maxPos) {
      state.positions[deck]++;
      updateCarousel(deck);
    } else if (dx > 0 && state.positions[deck] > 0) {
      state.positions[deck]--;
      updateCarousel(deck);
    }
  }
  touchStartX = null;
}, { passive: true });

document.addEventListener('keydown', (e) => {
  const deck = state.currentDeck;
  const maxPos = DECKS[deck].length - 1;
  if (e.key === 'ArrowRight' && state.positions[deck] < maxPos) {
    state.positions[deck]++;
    updateCarousel(deck);
  } else if (e.key === 'ArrowLeft' && state.positions[deck] > 0) {
    state.positions[deck]--;
    updateCarousel(deck);
  } else if (e.key === '1' || e.key === '2' || e.key === '3') {
    switchDeck(e.key);
  }
});

document.addEventListener('gesturestart', (e) => e.preventDefault());
document.addEventListener('dblclick', (e) => e.preventDefault());
</script>
